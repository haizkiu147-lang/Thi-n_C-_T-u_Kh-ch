        const getElementColor = (element) => {

                case 'Thủy': return 'text-blue-700'; case 'Hỏa': return 'text-red-600'; 
                case 'Thổ': return 'text-amber-900'; default: return 'text-gray-800';
            }
        };

        const getVuongSuyColor = (vs) => {
            if (vs === "Vượng") return "text-red-600 font-extrabold";
            if (vs === "Tướng") return "text-pink-600 font-bold";
            if (vs === "Hưu") return "text-emerald-700 font-semibold";
            if (vs === "Tù") return "text-amber-800 font-semibold";
            if (vs === "Tử") return "text-gray-900 font-extrabold";
            return "text-gray-600";
        };

        function getLucThan(cungNguHanH, haoNguHanh) {
            if (cungNguHanH === haoNguHanh) return 'Huynh Đệ';
            if (ELEMENTS_RELATION[cungNguHanH].sinh === haoNguHanh) return 'Tử Tôn';
            if (ELEMENTS_RELATION[cungNguHanH].khac === haoNguHanh) return 'Thê Tài';
            if (ELEMENTS_RELATION[haoNguHanh].sinh === cungNguHanH) return 'Phụ Mẫu';
            if (ELEMENTS_RELATION[haoNguHanh].khac === cungNguHanH) return 'Quan Quỷ';
            return '';
        }

        function anLinhHao(trigramId, stepIdx) {
            const isUpper = stepIdx >= 3;
            const subIdx = stepIdx % 3;
            const napArray = isUpper ? NAP_GIAP[trigramId].ngoai : NAP_GIAP[trigramId].noi;
            const parts = napArray[subIdx].split(' ');
            return { can: parts[0], chi: parts[1], element: CHI_NGU_HANH[parts[1]] || "Kim" };
        }

        function timPhucThan(cungName, chuLines) {
            const cungElement = CUNG_ELEMENTS[cungName];
            const neededLucThan = ["Huynh Đệ", "Tử Tôn", "Thê Tài", "Quan Quỷ", "Phụ Mẫu"];
            const ownedLucThan = chuLines.map(l => l.lucThan);
            const missing = neededLucThan.filter(t => !ownedLucThan.includes(t));
            if (missing.length === 0) return {};

            const masterTrigram = BAT_QUAI.find(b => b.name === cungName);
            if (!masterTrigram) return {};

            const mapPhuc = {};
            for (let idx = 0; idx < 6; idx++) {
                const isUpper = idx >= 3;
                const subIdx = idx % 3;
                const napArray = isUpper ? NAP_GIAP[masterTrigram.id].ngoai : NAP_GIAP[masterTrigram.id].noi;
                const parts = napArray[subIdx].split(' ');
                const element = CHI_NGU_HANH[parts[1]];
                const lucThan = getLucThan(cungElement, element);
                
                if (missing.includes(lucThan)) {
                    mapPhuc[idx] = { lucThan, can: parts[0], chi: parts[1], element };
                }
            }
            return mapPhuc;
        }

        const checkVuongSuy = (haoElement, mChi) => {
            const monthEl = CHI_NGU_HANH[mChi];
            if (haoElement === monthEl) return "Vượng"; 
            if (ELEMENTS_RELATION[monthEl].sinh === haoElement) return "Tướng";

                            </div>

                            <div className="export-container relative shadow-xl rounded-md bg-[#e5dfd3] p-1 w-full max-w-[920px]">
                                <div id="pdf-render-zone" className="la-que-bg p-3 sm:p-6 pb-8 relative rounded-sm mx-auto flex flex-col">
                                    
                                    <div className="text-center mb-6">
                                        <h1 className="text-[26px] sm:text-[34px] font-bold uppercase tracking-widest serif-title text-[#a91d1d]">Tờ Sớ Chiêm Bốc</h1>
                                        <div className="w-56 h-[2px] bg-[#d4af37] mx-auto mt-2"></div>
                                        <div className="mt-4 flex justify-center"><span className="bg-[#a91d1d] text-white px-4 py-1.5 rounded-full text-xs font-bold uppercase tracking-wide flex items-center gap-2 shadow-sm"><i className="fa-solid fa-crosshairs"></i> Vấn sự: {mucDich}</span></div>
                                    </div>

                                    <div className="bg-white/60 p-4 border border-[#e5d3b3] rounded-lg mb-6 text-[12px] sm:text-[13px] document-text shadow-sm flex flex-col gap-3">
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-2 border-b border-gray-200 pb-3">
                                            <div><span className="text-gray-600">Thời gian lập quẻ:</span> <span className="font-bold text-gray-900 ml-2">{solarTime} {solarDate ? solarDate.split('-').reverse().join('/') : ''}</span></div>
                                            <div><span className="text-gray-600">Theo Âm Lịch:</span> <span className="font-bold text-indigo-900 ml-2">giờ {hourChi}, ngày {lunarDay}/{lunarMonth}/{lunarYear} {isLeapMonth ? '(Nhuận)' : ''}</span></div>
                                        </div>
                                        <div className="border-b border-gray-200 pb-3 flex gap-2">
                                            <span className="text-gray-600 whitespace-nowrap pt-1">Can Chi:</span> 
                                            <span className="font-bold text-amber-900 uppercase leading-snug">GIỜ {hourCan} {hourChi}, NGÀY {dayCan} {dayChi},<br/>THÁNG {monthCan} {monthChi}, NĂM {yearCan} {yearChi}</span>
                                        </div>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
                                            <div><span className="text-gray-600">Tiết khí:</span> <span className="font-bold text-teal-800 ml-2">{tietKhi}</span></div>
                                            <div><span className="text-gray-600">Nhật thần:</span> <span className="font-extrabold text-[#a91d1d] ml-2">{dayChi}-{layTienChi(dayChi)}</span></div>
                                            <div className="sm:col-start-2"><span className="text-gray-600">Nguyệt lệnh:</span> <span className="font-extrabold text-[#a91d1d] ml-2">{monthChi}-{layTienChi(monthChi)}</span></div>
                                        </div>
                                        {systemType === 'maihoa' && serialString && (<div className="pt-2 border-t border-gray-200"><span className="text-gray-600">Căn khí số:</span> <span className="text-purple-800 font-bold tracking-widest ml-2">{serialString}</span></div>)}
                                    </div>

                                    {systemType === 'luchao' && (
                                        <div className="w-full">
                                            <div className="flex flex-row justify-around items-center px-2 sm:px-6 mb-6">
                                                <div className="flex flex-col items-center w-5/12">
                                                    <h2 className="text-[18px] sm:text-[22px] font-extrabold text-[#a91d1d] uppercase serif-title tracking-wide text-center">{chuName}</h2>
                                                    <div className="w-24 sm:w-32 space-y-3 my-5">
                                                        {chuLines.slice().reverse().map(l => (
                                                            <div key={l.index}>
                                                                {l.binary === 1 ? (<div className={`h-3 rounded-sm ${l.isDong ? 'bg-[#a91d1d]' : 'bg-[#1a1a1a]'}`}></div>) : (<div className="flex justify-between h-3"><div className={`w-[44%] h-full rounded-sm ${l.isDong ? 'bg-[#a91d1d]' : 'bg-[#1a1a1a]'}`}></div><div className={`w-[44%] h-full rounded-sm ${l.isDong ? 'bg-[#a91d1d]' : 'bg-[#1a1a1a]'}`}></div></div>)}
                                                            </div>
                                                        ))}
                                                    </div>
                                                    <p className="text-[12px] sm:text-[14px] font-bold text-gray-700 text-center">BẢN QUÁI CUNG {chuCungName.toUpperCase()}</p>
                                                </div>
                                                <div className="flex flex-col items-center text-gray-400 font-bold text-xs"><span>BIẾN HÓA</span><span className="text-2xl mt-1 text-[#a91d1d]">→</span></div>
                                                <div className="flex flex-col items-center w-5/12">
                                                    <h2 className="text-[18px] sm:text-[22px] font-extrabold text-[#a91d1d] uppercase serif-title tracking-wide text-center">{bienName}</h2>
                                                    <div className="w-24 sm:w-32 space-y-3 my-5">
                                                        {bienLines.slice().reverse().map(l => (
                                                            <div key={l.index}>
                                                                {l.binary === 1 ? <div className="h-3 rounded-sm bg-[#1a1a1a]"></div> : <div className="flex justify-between h-3"><div className="w-[44%] h-full rounded-sm bg-[#1a1a1a]"></div><div className="w-[44%] h-full rounded-sm bg-[#1a1a1a]"></div></div>}
                                                            </div>
                                                        ))}
                                                    </div>
                                                    <p className="text-[12px] sm:text-[14px] font-bold text-gray-700 text-center">BIẾN QUÁI CUNG {bienCungName.toUpperCase()}</p>
                                                </div>
                                            </div>

                                            <div className="text-center font-bold text-[14px] sm:text-[15px] uppercase tracking-wider text-[#a91d1d] mb-6 bg-[#f4ebd0] py-3 px-4 border border-[#d4af37] shadow-sm">Tượng ý: {chuThoan}</div>

                                            <div className="mb-6 table-container pb-2">
                                                <table className="w-full text-[10px] sm:text-[12px] text-center border-collapse min-w-[850px] shadow-sm bg-white">
                                                    <thead>
                                                        <tr className="bg-[#f4ebd0]">
                                                            <th className="p-1 border border-[#d4af37] font-bold text-amber-900">Hào</th>
                                                            <th className="p-1 border border-[#d4af37] font-bold text-amber-900">T/Ư</th>
                                                            <th className="p-1 border border-[#d4af37] font-bold text-amber-900">Lục Thân</th>
                                                            <th className="p-1 border border-[#d4af37] font-bold text-amber-900">Can Chi</th>
                                                            <th className="p-1 border border-[#d4af37] font-bold text-amber-900">Phục Thần</th>
                                                            <th className="p-1 border border-[#d4af37] font-bold text-red-700">T.K</th>
                                                            <th className="p-1 border border-[#d4af37] font-bold text-amber-900 bg-orange-50/50">Lục Thân (B)</th>
                                                            <th className="p-1 border border-[#d4af37] font-bold text-amber-900 bg-orange-50/50">Can Chi (B)</th>
                                                            <th className="p-1 border border-[#d4af37] font-bold text-amber-900">Lục Thú</th>
                                                            <th className="p-1 border border-[#d4af37] font-bold text-indigo-900 bg-blue-50/50">Nguyệt Kiến</th>
                                                            <th className="p-1 border border-[#d4af37] font-bold text-indigo-900 bg-blue-50/50">T.S Ngày</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody>
                                                        {chuLines.slice().reverse().map((line, revIdx) => {
                                                            const idx = 5 - revIdx;
                                                            const isThe = (chuTheHao === idx + 1); const isUng = (chuUngHao === idx + 1); const isMoving = moving[idx];
                                                            const pf = mapPhuc[idx]; const bLine = bienLines[idx];
                                                            const elColor = getElementColor(line.element); const bElColor = getElementColor(bLine.element);
                                                            const tKhongBien = isMoving ? layThandSat(idx, bLine.chi, bLine.lucThan).includes("Tuần không") : false;
                                                            const v_s = checkVuongSuy(line.element, monthChi);
                                                            const ts_ngay = TR_SINH_MAP[line.element][dayChi];

                                                            let tinhTrang = v_s;
                                                            if (DIA_CHI_XUNG[monthChi] === line.chi) tinhTrang = "N.Phá";
                                                            else if (DIA_CHI_XUNG[dayChi] === line.chi) {
                                                                tinhTrang = ["Vượng", "Tướng"].includes(v_s) ? "Ám Động" : "Nhật Phá";
                                                            }

                                                            return (
                                                                <tr key={idx} className="hover:bg-[#faf4df] transition-colors">
                                                                    <td className="p-1.5 border border-[#e5d3b3] text-gray-900 font-bold whitespace-nowrap">
                                                                        <div className="flex flex-col items-center gap-0.5"><span>{["Sơ", "Nhị", "Tam", "Tứ", "Ngũ", "Thượng"][idx]}</span>{isMoving && <span className="bg-[#a91d1d] text-white text-[8px] px-1 py-0.5 rounded tracking-wider">ĐỘNG</span>}</div>
                                                                    </td>
                                                                    <td className="p-1 font-extrabold border border-[#e5d3b3]">{isThe ? <span className="text-red-600 border border-red-200 bg-red-50 px-1 rounded">Thế</span> : (isUng ? <span className="text-emerald-600 border border-emerald-200 bg-emerald-50 px-1 rounded">Ứng</span> : <span className="text-gray-400">-</span>)}</td>
                                                                    <td className={`p-1 border border-[#e5d3b3] font-bold whitespace-nowrap ${isMoving ? 'text-red-700' : 'text-gray-800'}`}>{line.lucThan}</td>
                                                                    <td className={`p-1 border border-[#e5d3b3] font-bold whitespace-nowrap ${elColor}`}>{line.can} {line.chi}-{line.element}</td>
                                                                    <td className="p-1 border border-[#e5d3b3] text-[9px] sm:text-[10px] text-gray-500 whitespace-nowrap bg-gray-50/50">{pf ? <span className="font-semibold text-amber-800">{pf.lucThan} <span className={getElementColor(pf.element)}>({pf.can} {pf.chi}-{pf.element})</span></span> : "-"}</td>
                                                                    <td className="p-1 border border-[#e5d3b3] text-red-600 font-bold bg-red-50/30">{layThandSat(idx, line.chi, line.lucThan).includes("Tuần không") ? "K" : "-"}</td>
                                                                    <td className="p-1 border border-[#e5d3b3] font-medium text-gray-600 whitespace-nowrap bg-orange-50/30">{isMoving ? <span className="font-bold text-red-800">{bLine.lucThan}</span> : "-"}</td>
                                                                    <td className="p-1 border border-[#e5d3b3] font-medium text-gray-600 whitespace-nowrap bg-orange-50/30">{isMoving ? <span className={`font-bold ${bElColor}`}>{bLine.can} {bLine.chi}-{bLine.element}{tKhongBien && <span className="text-red-600 text-[9px] ml-1">(K)</span>}</span> : "-"}</td>
                                                                    <td className="p-1 font-bold text-purple-800 border border-[#e5d3b3] whitespace-nowrap">{lucThuLineList[idx]}</td>
                                                                    <td className="p-1 border border-[#e5d3b3] bg-blue-50/30">
                                                                        {tinhTrang === "N.Phá" || tinhTrang === "Nhật Phá" ? <span className="text-red-600 font-bold">{tinhTrang}</span> : (tinhTrang === "Ám Động" ? <span className="text-purple-600 font-bold">Ám Động</span> : <span className={getVuongSuyColor(v_s)}>{v_s}</span>)}
                                                                    </td>
                                                                    <td className="p-1 border border-[#e5d3b3] font-semibold text-gray-700 bg-blue-50/30 whitespace-nowrap">{ts_ngay}</td>
                                                                </tr>
                                                            );
                                                        })}
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>
                                    )}

                                    {/* MAI HOA VIEW */}
                                    {systemType === 'maihoa' && (
                                        <div className="w-full">
                                            <div className="grid grid-cols-1 sm:grid-cols-3 gap-6 text-center mb-8 border-b-2 border-[#e5d3b3] pb-8 px-2">
                                                
                                                <div className="flex flex-col items-center bg-[#faf4df]/60 p-5 rounded-lg border-2 border-[#d4af37] shadow-md relative">
                                                    <div className="absolute -top-3 bg-[#d4af37] text-white px-3 py-0.5 rounded-full text-[10px] font-bold uppercase tracking-wider">Khởi Đầu</div>
                                                    <h3 className="text-[16px] font-bold text-[#a91d1d] uppercase mt-2 mb-1">QUẺ CHỦ</h3>
                                                    <p className="text-[12px] text-amber-800 font-medium mb-4">(Thể & Dụng)</p>
                                                    <div className="w-24 space-y-2.5 mb-4">
                                                        {totalMhBinChu.slice().reverse().map((v, i) => { const idx = 5 - i; const isMoving = (idx === mhHaoDong - 1); return v === 1 ? (<div key={i} className={`h-3 rounded-sm ${isMoving ? 'bg-[#a91d1d]' : 'bg-[#1a1a1a]'}`}></div>) : (<div key={i} className="flex justify-between h-3"><div className={`w-[44%] h-full rounded-sm ${isMoving ? 'bg-[#a91d1d]' : 'bg-[#1a1a1a]'}`}></div><div className={`w-[44%] h-full rounded-sm ${isMoving ? 'bg-[#a91d1d]' : 'bg-[#1a1a1a]'}`}></div></div>); })}
                                                    </div>
                                                    <div className="text-[12px] space-y-2 text-gray-700 w-full">
                                                        <p className="font-extrabold text-[15px] text-[#a91d1d] serif-title uppercase">{mhChuNameFull}</p>
                                                        <p className="bg-white px-2 py-1.5 rounded border border-amber-200 flex justify-between shadow-sm"><span>T.Quái:</span> <span className={`font-bold ${getElementColor(mhUpperQuai.element)}`}>{mhUpperQuai.name} ({mhUpperQuai.element})</span> {isDongInUpper ? <span className="text-red-600 font-bold">[DỤNG]</span> : <span className="text-emerald-700 font-bold">[THỂ]</span>}</p>
                                                        <p className="bg-white px-2 py-1.5 rounded border border-amber-200 flex justify-between shadow-sm"><span>H.Quái:</span> <span className={`font-bold ${getElementColor(mhLowerQuai.element)}`}>{mhLowerQuai.name} ({mhLowerQuai.element})</span> {isDongInUpper ? <span className="text-emerald-700 font-bold">[THỂ]</span> : <span className="text-red-600 font-bold">[DỤNG]</span>}</p>
                                                    </div>
                                                </div>

                                                <div className="flex flex-col items-center bg-white p-5 rounded-lg border border-[#e5d3b3] shadow-sm relative opacity-90">
                                                    <div className="absolute -top-3 bg-gray-400 text-white px-3 py-0.5 rounded-full text-[10px] font-bold uppercase tracking-wider">Quá Trình</div>
                                                    <h3 className="text-[16px] font-bold text-amber-900 uppercase mt-2 mb-1">QUẺ HỖ</h3>
                                                    <p className="text-[12px] text-amber-800 font-medium mb-4">(Hỗ Quái Ngầm)</p>
                                                    <div className="w-24 space-y-2.5 mb-4">
                                                        {hoUpperQuai.binary.slice().reverse().map((v, i) => v === 1 ? <div key={i} className="h-3 rounded-sm bg-[#555]"></div> : <div key={i} className="flex justify-between h-3"><div className="w-[44%] h-full rounded-sm bg-[#555]"></div><div className="w-[44%] h-full rounded-sm bg-[#555]"></div></div>)}
                                                        {hoLowerQuai.binary.slice().reverse().map((v, i) => v === 1 ? <div key={i} className="h-3 rounded-sm bg-[#555]"></div> : <div key={i} className="flex justify-between h-3"><div className="w-[44%] h-full rounded-sm bg-[#555]"></div><div className="w-[44%] h-full rounded-sm bg-[#555]"></div></div>)}
                                                    </div>
                                                    <div className="text-[12px] space-y-2 text-gray-700 w-full">
                                                        <p className="font-extrabold text-[15px] text-amber-900 serif-title uppercase">{mhHoNameFull}</p>
                                                        <p className="bg-gray-50 px-2 py-1.5 rounded border border-gray-200 flex justify-between"><span>Thượng:</span> <span className={`font-bold ${getElementColor(hoUpperQuai.element)}`}>{hoUpperQuai.name} ({hoUpperQuai.element})</span></p>
                                                        <p className="bg-gray-50 px-2 py-1.5 rounded border border-gray-200 flex justify-between"><span>Hạ:</span> <span className={`font-bold ${getElementColor(hoLowerQuai.element)}`}>{hoLowerQuai.name} ({hoLowerQuai.element})</span></p>
                                                    </div>
                                                </div>

                                                <div className="flex flex-col items-center bg-[#faf4df]/60 p-5 rounded-lg border-2 border-[#d4af37] shadow-md relative">
                                                    <div className="absolute -top-3 bg-[#a91d1d] text-white px-3 py-0.5 rounded-full text-[10px] font-bold uppercase tracking-wider">Hậu Vận</div>
                                                    <h3 className="text-[16px] font-bold text-[#a91d1d] uppercase mt-2 mb-1">QUẺ BIẾN</h3>
                                                    <p className="text-[12px] text-amber-800 font-medium mb-4">(Kết Quả Biến)</p>
                                                    <div className="w-24 space-y-2.5 mb-4">
                                                        {totalMhBinBien.slice().reverse().map((v, i) => v === 1 ? <div key={i} className="h-3 rounded-sm bg-[#1a1a1a]"></div> : <div key={i} className="flex justify-between h-3"><div className="w-[44%] h-full rounded-sm bg-[#1a1a1a]"></div><div className="w-[44%] h-full rounded-sm bg-[#1a1a1a]"></div></div>)}
                                                    </div>
                                                    <div className="text-[12px] space-y-2 text-gray-700 w-full">
                                                        <p className="font-extrabold text-[15px] text-[#a91d1d] serif-title uppercase">{mhBienNameFull}</p>
                                                        <p className="bg-white px-2 py-1.5 rounded border border-amber-200 flex justify-between shadow-sm"><span>Thượng:</span> <span className={`font-bold ${getElementColor(mhUpperBienQuai.element)}`}>{mhUpperBienQuai.name} ({mhUpperBienQuai.element})</span></p>
                                                        <p className="bg-white px-2 py-1.5 rounded border border-amber-200 flex justify-between shadow-sm"><span>Hạ:</span> <span className={`font-bold ${getElementColor(mhLowerBienQuai.element)}`}>{mhLowerBienQuai.name} ({mhLowerBienQuai.element})</span></p>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {/* LỜI LUẬN GIẢI */}
                                    <div className="w-full mt-4">
                                        <div className="flex items-center gap-3 mb-4">
                                            <i className="fa-solid fa-book-journal-whills text-[#a91d1d] text-2xl"></i>
                                            <h3 className="text-[16px] sm:text-[18px] font-bold text-[#8b1c1c] uppercase serif-title">Lời Bàn Luận Giải Của Dịch Sư</h3>
                                        </div>
                                        <textarea id="luan-giai-textarea" ref={textRef} className="auto-resize w-full p-4 border border-amber-300 rounded-lg outline-none bg-white text-gray-900 document-text text-[14px] sm:text-[15px] leading-loose shadow-inner" style={{ minHeight: '300px' }} placeholder="Bấm nút 'Luận Quẻ' ở trên để hệ thống sinh lời luận giải chuẩn Tăng San..." value={luanGiaiText} onChange={(e) => setLuanGiaiText(e.target.value)}></textarea>
                                        <div className="text-right mt-2 text-xs text-amber-700 italic no-print">* Bạn có thể tự chỉnh sửa trực tiếp nội dung trên trước khi xuất PDF.</div>
                                    </div>

                                    {/* FOOTER */}
                                    <div className="mt-10 pt-6 border-t-2 border-[#d4af37] flex flex-col sm:flex-row justify-between items-start sm:items-end px-2 gap-4">
                                        <div className="text-[12px] sm:text-[13px] font-medium space-y-1.5 document-text">
                                            <p className="text-[#a91d1d] mb-2 pb-1 inline-block font-bold">Hệ thống an sao Dịch Lý - Thiết kế bởi Thiên Cơ</p>
                                            <p className="flex items-center gap-2 text-gray-800"><i className="fa-brands fa-facebook text-[#1877F2] text-[16px]"></i> <span className="font-bold tracking-wide">FB: Lê Hữu Hải</span></p>
                                            <p className="flex items-center gap-2 text-gray-800"><i className="fa-solid fa-square-phone text-[#25D366] text-[16px]"></i> <span className="font-bold tracking-wide">Zalo: 0982076615</span></p>
                                        </div>
                                        <div className="text-left sm:text-right w-full sm:w-auto">
                                            <p className="text-[12px] sm:text-[14px] text-amber-900 mb-[-10px] sm:pr-2 font-bold uppercase tracking-widest document-text">Luận giải chiêm bốc bởi</p>
                                            <h3 className="text-[38px] sm:text-[50px] text-[#a91d1d] signature-font font-bold sm:pr-2 mt-2 sm:mt-0">Thiên Cơ Tửu Khách</h3>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MainApp />);
    </script>
</body>
</html>
