                            } else if (["Vượng", "Tướng"].includes(vsTarget) && isDongHao(targetLine)) {
                                txt += `- Đang rất Vượng lại Động, sự việc diễn ra rất nhanh. Chú ý khoảng ngày/tháng **${xungChi}** (Xung để nổ) hoặc đúng ngày/tháng **${chiDt}**.\n`;
                            } else if (["Hưu", "Tù", "Tử"].includes(vsTarget) || targetLine.isDong === false) {
                                txt += `- Đang chậm/Tĩnh. Thông thường sự việc ứng vào ngày/tháng có địa chi là **${chiDt}**, hoặc ngày tháng sinh vượng cho hành ${targetLine.element} (${TR_SINH_MAP[targetLine.element]['Lâm Quan']} hoặc ${TR_SINH_MAP[targetLine.element]['Đế Vượng']}).\n`;
                            }
                        }

                        txt += `\n*Lời ngỏ: Quẻ Dịch hiển lộ Thiên Cơ, chỉ ra Cát Hung để con người biết lối mà tiến thối. Quẻ Cát không kiêu, Quẻ Hung xin lấy đức mà cải mệnh!*`;

                    } else {
                        txt += `[BÍ TRUYỀN MAI HOA DỊCH SỐ] - PHÂN TÍCH CHUẨN LỊCH LÝ\n\n`;
                        txt += `Kính thưa quý hữu, quẻ chiêm về việc **"${finalMucDich}"** lập vào ngày ${dayCan} ${dayChi}. Luận giải theo Dịch Lý Mai Hoa:\n\n`;
                        txt += `- Thể Quái: ${theQuai.name} (${theQuai.element}) - Đại diện cho bản thân tín chủ.\n`;
                        txt += `- Dụng Quái: ${dungQuai.name} (${dungQuai.element}) - Đại diện cho sự việc (${finalMucDich}).\n`;
                        txt += `- Trạng thái (Nguyệt lệnh tháng ${monthChi}): Thể đang ở thế ${checkVuongSuy(theQuai.element, monthChi)}, Dụng đang ở thế ${checkVuongSuy(dungQuai.element, monthChi)}.\n`;
                        txt += `=================================================\n`;
                        
                        if(chuDeType === 'THOI_TIET') {
                            txt += `► **Dự báo Mai Hoa thời tiết:**\n`;
                            if(dungQuai.element === 'Thủy') txt += `  Trời có khả năng mưa, độ ẩm cao hoặc sương mù dày.\n`;
                            else if(dungQuai.element === 'Hỏa') txt += `  Trời quang mây tạnh, nắng ấm rực rỡ, hanh khô.\n`;
                            else if(dungQuai.element === 'Mộc' || dungQuai.element === 'Kim') txt += `  Trời có gió, không khí luân chuyển, ôn hòa.\n`;
                            else txt += `  Trời âm u, mây dày đặc bao phủ.\n`;
                        } else {
                            if(theQuai.element === dungQuai.element) {
                                txt += `► **✅ HÒA HỢP (Thể Dụng Tỷ Hòa):** Rất tốt. Cùng chí hướng, sự việc diễn ra bình an, êm đẹp, không gặp trắc trở, có người giúp đỡ.\n`;
                            }
                            else if(ELEMENTS_RELATION[theQuai.element].sinh === dungQuai.element) {
                                txt += `► **💦 HAO TỔN (Thể sinh Dụng):** Bạn phải xuất tiền, bỏ sức lực chạy theo sự việc. Sẽ vất vả, mệt mỏi mới mong xong việc.\n`;
                            }
                            else if(ELEMENTS_RELATION[dungQuai.element].sinh === theQuai.element) {
                                txt += `► **🌟 ĐẠI CÁT (Dụng sinh Thể):** Vạn sự hanh thông! Sự việc tự mang đến lợi ích cho bạn. Có quý nhân đưa đẩy, cầu gì được nấy mà không cần lao lực.\n`;
                            }
                            else if(ELEMENTS_RELATION[theQuai.element].khac === dungQuai.element) {
                                txt += `► **⚔️ VƯỢT KHÓ (Thể khắc Dụng):** Gian nan trước, thành công sau. Áp lực, nhưng bạn đủ bản lĩnh khống chế tình hình, cắn răng nỗ lực sẽ đoạt được mục đích.\n`;
                            }
                            else if(ELEMENTS_RELATION[dungQuai.element].khac === theQuai.element) {
                                txt += `► **❌ BẤT LỢI (Dụng khắc Thể):** Cực kỳ xấu. Sự việc/Áp lực bên ngoài đang vượt quá sức chịu đựng của bạn, mang lại rủi ro, tai họa lớn. Tuyệt đối nên phòng thủ, không nên tiến!\n`;
                            }
                        }

                        txt += `\n*Lời bàn: "Quẻ Dịch hiển lộ Thiên Cơ để người đời tự biết mà tu chỉnh, tiến thối đúng lúc!"*`;
                    }
                    
                    setLuanGiaiText(txt); setIsGenerating(false);
                    setTimeout(() => { const ta = document.getElementById('luan-giai-textarea'); if(ta) { ta.scrollIntoView({ behavior: 'smooth' }); ta.style.height = 'auto'; ta.style.height = ta.scrollHeight + 'px'; } }, 100);
                    showNotification("Dịch Sư đã luận giải chuyên sâu xong!");
                }, 800);
            };

            const handleExportImage = () => {
                const captureArea = document.getElementById('pdf-render-zone'); 
                if (!captureArea) return;
                
                setIsExporting(true); 
                showNotification("Đang chuẩn bị tải ảnh lá quẻ sắc nét...");
                
                captureArea.classList.add('export-mode');

                html2canvas(captureArea, { 
                    scale: 3, 
                    useCORS: true, 
                    backgroundColor: '#fdfaf2',
                    scrollY: -window.scrollY
                }).then(canvas => { 
                    captureArea.classList.remove('export-mode'); 
                    const labelFile = systemType === 'luchao' ? `LucHao-${chuName}` : `MaiHoa-${mhChuNameFull}`;
                    const link = document.createElement('a');
                    link.download = `La-Que-${labelFile.replace(/\s+/g, '-')}.png`;
                    link.href = canvas.toDataURL('image/png', 1.0);
                    link.click();
                    setIsExporting(false); 
                    showNotification("Đã tải ảnh lá quẻ chất lượng cao thành công!"); 
                }).catch(err => { 
                    console.error("Lỗi xuất ảnh:", err); 
                    captureArea.classList.remove('export-mode'); 
                    setIsExporting(false); 
                    showNotification("Có lỗi khi xuất ảnh."); 
                });
            };

            const placeholderText = systemType === 'luchao' 
                ? "Hệ thống đang chờ lệnh... Bấm nút 'Luận Quẻ' ở trên để xem Dịch Sư luận giải Lục Hào (chuẩn Tăng San)." 
                : "Hệ thống đang chờ lệnh... Bấm nút 'Luận Quẻ' ở trên để xem Dịch Sư luận giải Mai Hoa.";

                            <span className="text-sm font-medium">{notification}</span>
                        </div>

                            <div>
                                <h1 className="text-lg sm:text-xl font-bold uppercase serif-title tracking-wider rainbow-text">THIÊN CƠ TỬU KHÁCH</h1>
                                <p className="text-xs text-amber-200">Luận giải chuẩn Tăng San Bốc Dịch</p>
                            </div>
                        </div>
                        <div className="flex gap-2 w-full sm:w-auto justify-center">
                            <button onClick={() => setView('setup')} className={`px-6 py-2 text-sm font-bold rounded-lg transition-all flex justify-center items-center gap-2 ${view === 'setup' ? 'bg-[#a91d1d] text-white shadow' : 'bg-amber-800 text-amber-200 hover:text-white'}`}>
                                <i className="fa-solid fa-plus"></i> Soạn Quẻ Mới
                            </button>
                        </div>
                    </div>

                    {view === 'setup' && (
                        <div className="w-full max-w-[900px] grid grid-cols-1 lg:grid-cols-12 gap-6">
                            <div className="lg:col-span-5 bg-white p-5 rounded-2xl shadow-xl border border-amber-200 flex flex-col gap-5">
                                <div className="flex bg-amber-100 p-1 rounded-lg w-full">
                                    <button onClick={() => setSystemType('luchao')} className={`flex-1 py-2 text-sm font-bold rounded-md transition-all ${systemType === 'luchao' ? 'bg-white text-[#a91d1d] shadow' : 'text-amber-800 hover:bg-amber-50'}`}>
                                        LỤC HÀO
                                    </button>
                                    <button onClick={() => setSystemType('maihoa')} className={`flex-1 py-2 text-sm font-bold rounded-md transition-all ${systemType === 'maihoa' ? 'bg-white text-[#a91d1d] shadow' : 'text-amber-800 hover:bg-amber-50'}`}>
                                        MAI HOA
                                    </button>
                                </div>

                                <div className="border border-amber-100 p-4 rounded-xl bg-amber-50/50 shadow-inner">

                                            </button>

                                                className={`cursor-pointer p-2 rounded-lg border flex items-center justify-between transition-all ${!isCustomTopic && selectedTopic.name === item.name ? 'bg-red-50 border-red-300 shadow-sm' : 'bg-white border-gray-200 hover:border-amber-400'}`}

                                                <div className="flex items-center gap-2">
                                                    <div className={`w-6 text-center ${!isCustomTopic && selectedTopic.name === item.name ? 'text-[#a91d1d]' : 'text-gray-400'}`}><i className={`fa-solid ${item.icon}`}></i></div>
                                                    <span className={`text-[12px] font-bold ${!isCustomTopic && selectedTopic.name === item.name ? 'text-[#a91d1d]' : 'text-gray-700'}`}>{item.name}</span>
                                                </div>
                                                {systemType === 'luchao' && (
                                                    <span className="text-[10px] px-2 py-0.5 rounded bg-gray-100 text-gray-500 font-semibold border border-gray-200">Dụng: {item.dungThan}</span>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                    
                                    <div className="relative pt-2">

                                            />
                                            {isCustomTopic && systemType === 'luchao' && (

                                                    <select value={customDungThan} onChange={e => setCustomDungThan(e.target.value)} className="flex-1 bg-white border border-red-200 rounded p-1 text-xs font-bold text-gray-700 outline-none">
                                                        <option value="Thế">Bản thân / Hỏi chung (Thế)</option>
                                                        <option value="Thê Tài">Tiền bạc / Vợ / Bạn gái (Thê Tài)</option>
                                                        <option value="Quan Quỷ">Công việc / Bệnh tật / Chồng (Quan Quỷ)</option>
                                                        <option value="Phụ Mẫu">Giấy tờ / Nhà cửa / Bố mẹ (Phụ Mẫu)</option>
                                                        <option value="Tử Tôn">Con cái / Thú cưng / Thuốc (Tử Tôn)</option>
                                                        <option value="Ứng">Đối tác / Kiện tụng / Nơi đến (Ứng)</option>
                                                    </select>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>

                                <div>
                                    <div className="flex justify-between items-center mb-3">

                                            <i className="fa-solid fa-rotate"></i> Cập nhật
                                        </button>
                                    </div>
                                    
                                    <div className="bg-white border border-amber-100 rounded-lg p-3 shadow-sm space-y-3">

                                            <div><label className="text-[10px] text-gray-500 font-bold mb-1 block">Giờ (Dương)</label><input type="time" value={solarTime} onChange={e => setSolarTime(e.target.value)} className="w-full border border-gray-300 rounded p-1.5 text-sm bg-gray-50 outline-none focus:border-amber-400" /></div>
                                        </div>
                                        <div>
                                            <label className="text-[10px] text-gray-500 font-bold mb-1 block">Âm Lịch</label>

                                                <input type="number" min="1" max="30" placeholder="Ngày" value={lunarDay} onChange={e => setLunarDay(e.target.value)} className="w-1/3 border border-gray-300 rounded p-1.5 text-sm bg-gray-50 outline-none text-center" />
                                                <input type="number" min="1" max="12" placeholder="Tháng" value={lunarMonth} onChange={e => setLunarMonth(e.target.value)} className="w-1/3 border border-gray-300 rounded p-1.5 text-sm bg-gray-50 outline-none text-center" />
                                                <input type="number" placeholder="Năm" value={lunarYear} onChange={e => setLunarYear(e.target.value)} className="w-1/3 border border-gray-300 rounded p-1.5 text-sm bg-gray-50 outline-none text-center" />

                                        <div>
                                            <label className="text-[10px] text-gray-500 font-bold mb-1 block">Tiết Khí</label>

                                        </div>
                                    </div>

                                    <div className="mt-3 p-3 bg-amber-50 border border-amber-200 rounded-lg shadow-inner">

                                            <div className="flex flex-col gap-1"><label className="text-[10px] text-gray-500 font-bold text-center border-b border-amber-200 pb-1 mb-1">Tháng (Ng.Lệnh)</label><div className="flex gap-1"><select value={monthCan} onChange={e => setMonthCan(e.target.value)} className="w-1/2 border rounded p-1 text-xs bg-white outline-none font-bold text-emerald-800 text-center">{THIEN_CAN.map(c => <option key={c} value={c}>{c}</option>)}</select><select value={monthChi} onChange={e => setMonthChi(e.target.value)} className="w-1/2 border rounded p-1 text-xs bg-white outline-none font-bold text-emerald-800 text-center">{DIA_CHI.map(c => <option key={c} value={c}>{c}</option>)}</select></div></div>

                                            <div className="flex flex-col gap-1"><label className="text-[10px] text-gray-500 font-bold text-center border-b border-amber-200 pb-1 mb-1">Giờ</label><div className="flex gap-1"><select value={hourCan} onChange={e => setHourCan(e.target.value)} className="w-1/2 border rounded p-1 text-xs bg-white outline-none font-bold text-gray-700 text-center">{THIEN_CAN.map(c => <option key={c} value={c}>{c}</option>)}</select><select value={hourChi} onChange={e => setHourChi(e.target.value)} className="w-1/2 border rounded p-1 text-xs bg-white outline-none font-bold text-gray-700 text-center">{DIA_CHI.map(c => <option key={c} value={c}>{c}</option>)}</select></div></div>
                                        </div>
                                    </div>
                                </div>

                                {systemType === 'luchao' && (
                                    <div className="border-t border-amber-100 pt-3 flex flex-col gap-3">
                                        <h3 className="text-sm font-bold text-amber-900 uppercase flex items-center gap-2 mb-1"><i className="fa-solid fa-bars-staggered"></i> Thiết lập Lục Hào</h3>
                                        <div><label className="text-[11px] font-bold text-gray-600 block mb-1">Thượng Quái:</label><select value={upperId} onChange={e => setUpperId(parseInt(e.target.value))} className="w-full border border-gray-300 rounded p-2 text-sm bg-white outline-none focus:border-amber-400 font-bold">{BAT_QUAI.map(q => <option key={q.id} value={q.id}>{q.name} {q.symbol} (Hành {q.element})</option>)}</select></div>
                                        <div><label className="text-[11px] font-bold text-gray-600 block mb-1">Hạ Quái:</label><select value={lowerId} onChange={e => setLowerId(parseInt(e.target.value))} className="w-full border border-gray-300 rounded p-2 text-sm bg-white outline-none focus:border-amber-400 font-bold">{BAT_QUAI.map(q => <option key={q.id} value={q.id}>{q.name} {q.symbol} (Hành {q.element})</option>)}</select></div>
                                        <div>
                                            <label className="text-[11px] font-bold text-gray-600 block mb-1.5">Bấm vào nút để nảy Hào Động:</label>
                                            <div className="grid grid-cols-3 sm:grid-cols-6 gap-2">{[0, 1, 2, 3, 4, 5].map(idx => (<button key={idx} onClick={() => toggleHaoDong(idx)} className={`py-1.5 text-xs font-bold rounded border transition-colors ${moving[idx] ? 'bg-red-600 border-red-700 text-white shadow-inner' : 'bg-white text-gray-700 border-gray-300 hover:bg-amber-100'}`}>Hào {idx + 1}</button>))}</div>
                                        </div>
                                    </div>
                                )}

                                {systemType === 'maihoa' && (
                                    <div className="border-t border-amber-100 pt-3 flex flex-col gap-3">
                                        <h3 className="text-sm font-bold text-amber-900 uppercase flex items-center gap-2 mb-1"><i className="fa-solid fa-wand-magic-sparkles"></i> Thiết lập số Mai Hoa</h3>
                                        <div className="p-3 bg-amber-50 rounded-lg border border-amber-200 shadow-sm"><label className="text-[12px] font-bold text-amber-900 block mb-1.5"><i className="fa-solid fa-keyboard text-green-700 mr-1"></i> Nhập SĐT / Seri</label><input type="text" placeholder="VD: 0981234567" value={serialString} onChange={e => handleSerialChange(e.target.value)} className="w-full border border-amber-300 rounded p-2 text-sm outline-none bg-white focus:border-red-500 font-bold tracking-wide"/></div>
                                        <div className="grid grid-cols-3 gap-2 mt-1">
                                            <div><label className="text-[11px] font-bold text-gray-600 block mb-1">Thượng:</label><input type="number" min="1" value={numUpper} onChange={e => setNumUpper(e.target.value)} className="w-full border rounded p-1.5 text-sm outline-none bg-amber-50/50 text-center font-bold" /><span className="text-[10px] text-gray-500 font-bold text-[#a91d1d] block text-center mt-1">{mhUpperQuai.name} ({mhUpperQuai.number})</span></div>
                                            <div><label className="text-[11px] font-bold text-gray-600 block mb-1">Hạ:</label><input type="number" min="1" value={numLower} onChange={e => setNumLower(e.target.value)} className="w-full border rounded p-1.5 text-sm outline-none bg-amber-50/50 text-center font-bold" /><span className="text-[10px] text-gray-500 font-bold text-[#a91d1d] block text-center mt-1">{mhLowerQuai.name} ({mhLowerQuai.number})</span></div>
                                            <div><label className="text-[11px] font-bold text-gray-600 block mb-1">H.Động:</label><input type="number" min="1" max="6" value={numMoving} onChange={e => setNumMoving(e.target.value)} className="w-full border rounded p-1.5 text-sm outline-none bg-amber-50/50 text-center font-bold text-red-600" /><span className="text-[10px] text-gray-500 font-bold text-red-600 block text-center mt-1">Động Hào {mhHaoDong}</span></div>
                                        </div>
                                    </div>
                                )}
                                <button onClick={handleSetupSubmit} className="w-full mt-2 bg-[#a91d1d] hover:bg-red-800 text-white font-bold py-3.5 rounded-xl shadow-lg uppercase text-sm flex items-center justify-center gap-2 transition transform active:scale-95 border-b-4 border-red-900"><i className="fa-solid fa-yin-yang animate-spin"></i> XEM KẾT QUẢ QUẺ</button>
                            </div>

                            <div className="lg:col-span-7 bg-white p-6 rounded-2xl shadow-xl border border-amber-200 hidden lg:block">
                                <h3 className="text-md font-bold text-amber-900 uppercase border-b pb-2 mb-4">Hình quẻ xem trước (Nháp)</h3>
                                <div className="flex flex-col items-center bg-amber-50/50 p-6 rounded-xl border border-dashed border-amber-200 min-h-[500px] justify-center">
                                    <p className="text-gray-500 text-sm italic">Bấm "Xem kết quả quẻ" để xem lá quẻ chi tiết.</p>
                                </div>
                            </div>
                        </div>
                    )}

                    {view === 'result' && (
                        <div className="w-full flex flex-col items-center">
                            
                            <div className="w-full max-w-[900px] flex flex-wrap justify-center items-center mb-6 px-1 gap-4 no-print">
                                <button onClick={generateSystemInterpretation} disabled={isGenerating} className={`w-full sm:w-auto bg-[#8b1c1c] hover:bg-[#6b1515] text-amber-50 text-sm font-bold py-3 px-6 rounded-lg shadow-md flex items-center justify-center gap-2 border border-[#d4af37] transition-all ${isGenerating ? 'opacity-70' : ''}`}>
                                    {isGenerating ? <i className="fa-solid fa-spinner animate-spin text-[#d4af37]"></i> : <i className="fa-solid fa-scroll text-[#d4af37]"></i>} {isGenerating ? 'Dịch Sư Đang Soạn...' : 'Luận Quẻ (Dịch Sư Phân Tích)'}
                                </button>
                                <button onClick={handleExportImage} disabled={isExporting} className="w-full sm:w-auto bg-amber-700 hover:bg-amber-800 text-white text-sm font-bold py-3 px-6 rounded-lg shadow-md flex items-center justify-center gap-2 transition-all">
                                    {isExporting ? <i className="fa-solid fa-spinner animate-spin"></i> : <i className="fa-solid fa-image"></i>} {isExporting ? 'Đang tải ảnh...' : 'Tải Lá Quẻ (Ảnh)'}
                                </button>
                            </div>

                            <div className="export-container relative shadow-xl rounded-md bg-[#e5dfd3] p-1 w-full max-w-[920px]">
                                <div id="pdf-render-zone" className="la-que-bg p-2 sm:p-4 pb-2 relative rounded-sm mx-auto flex flex-col">
                                    
                                    <div className="text-center mb-2">
                                        <h1 className="text-[18px] sm:text-[22px] font-bold uppercase tracking-widest serif-title rainbow-text mt-1">
                                            {systemType === 'luchao' ? 'LÁ QUẺ LỤC HÀO' : 'LÁ QUẺ MAI HOA'}
                                        </h1>
                                        <div className="w-40 h-[1px] bg-[#d4af37] mx-auto mt-1 mb-1.5"></div>
                                        <div className="flex justify-center">
                                            <span className="bg-[#a91d1d] text-white px-2 py-0.5 rounded-full text-[8px] sm:text-[10px] font-bold uppercase tracking-wide flex items-center gap-1.5 shadow-sm">
                                                <i className="fa-solid fa-crosshairs"></i> Vấn sự: {isCustomTopic ? customMucDich : selectedTopic.name}
                                            </span>
                                        </div>
                                    </div>

                                    <div className="text-[9px] sm:text-[11px] document-text text-gray-800 mb-2 px-1">
                                        <div className="flex justify-between border-b border-gray-300 pb-1 mb-1">
                                            <div><span className="text-gray-500">Thời điểm lập quẻ:</span> <span className="font-bold ml-1">{solarTime} {solarDate ? solarDate.split('-').reverse().join('/') : ''}</span></div>
                                            <div><span className="text-gray-500">Theo Âm Lịch:</span> <span className="font-bold text-indigo-900 ml-1">giờ {hourChi}, ngày {lunarDay}/{lunarMonth}/{lunarYear}</span></div>
                                        </div>
                                        <div className="border-b border-gray-300 pb-1 mb-1 flex gap-1">
                                            <span className="text-gray-500 whitespace-nowrap">Can Chi:</span>
                                            <span className="font-bold uppercase text-amber-900">Giờ {hourCan} {hourChi}, Ngày {dayCan} {dayChi}, Tháng {monthCan} {monthChi}, Năm {yearCan} {yearChi}</span>
                                        </div>
                                        <div className="flex justify-between pb-1">
                                            <div><span className="text-gray-500">Tiết khí:</span> <span className="font-bold text-teal-800 ml-1">{tietKhi}</span></div>
                                            <div><span className="text-gray-500">Nhật thần:</span> <span className="font-extrabold text-[#a91d1d] ml-1">{dayChi}-{layTienChi(dayChi)}</span></div>
                                            <div><span className="text-gray-500">Nguyệt lệnh:</span> <span className="font-extrabold text-[#a91d1d] ml-1">{monthChi}-{layTienChi(monthChi)}</span></div>
                                        </div>
                                    </div>

                                    {systemType === 'luchao' && (
                                        <div className="w-full border-t border-amber-300 pt-2">
                                            <div className="flex flex-row justify-around items-center px-1 mb-2">
                                                <div className="flex flex-col items-center w-[45%]">
                                                    <h2 className="text-[12px] sm:text-[14px] font-extrabold text-[#a91d1d] uppercase serif-title tracking-wide text-center">{chuName}</h2>
                                                    <BigHexagram lines={chuLines} className="w-8 sm:w-10 space-y-[2px] sm:space-y-[3px] my-1" lineClass="h-[3px] sm:h-[4px]" />
                                                    <p className="text-[8px] sm:text-[9px] font-bold text-gray-700 text-center uppercase">CUNG {chuCungName}</p>
                                                </div>
                                                <div className="flex flex-col items-center text-gray-400 font-bold text-[8px] sm:text-[10px]">
                                                    <span>BIẾN</span><span className="text-lg text-[#a91d1d]">→</span>
                                                </div>
                                                <div className="flex flex-col items-center w-[45%]">
                                                    <h2 className="text-[12px] sm:text-[14px] font-extrabold text-[#a91d1d] uppercase serif-title tracking-wide text-center">{bienName}</h2>
                                                    <BigHexagram lines={bienLines} className="w-8 sm:w-10 space-y-[2px] sm:space-y-[3px] my-1" lineClass="h-[3px] sm:h-[4px]" />
                                                    <p className="text-[8px] sm:text-[9px] font-bold text-gray-700 text-center uppercase">CUNG {bienCungName}</p>
                                                </div>
                                            </div>

                                            <div className="text-center font-bold text-[8px] sm:text-[10px] uppercase tracking-wider text-[#a91d1d] mb-1.5 bg-[#f4ebd0] py-1 px-2 border-y border-[#d4af37] shadow-sm">
                                                Tượng ý: {chuThoan}
                                            </div>

                                            <div className="mb-1.5 w-full">
                                                <table className="w-full text-[8px] sm:text-[10px] text-center border-collapse bg-white border border-[#e5d3b3]">
                                                    <thead>
                                                        <tr className="bg-[#f4ebd0] border-b border-[#d4af37]">
                                                            <th className="py-[3px] px-0.5 border-r border-[#e5d3b3] font-bold text-amber-900 w-[6%]">Hào</th>
                                                            <th className="py-[3px] px-0.5 border-r border-[#e5d3b3] font-bold text-amber-900 w-[6%]">T/Ư</th>
                                                            <th className="py-[3px] px-0.5 border-r border-[#e5d3b3] font-bold text-amber-900 w-[12%]">L.Thân</th>
                                                            <th className="py-[3px] px-0.5 border-r border-[#e5d3b3] font-bold text-amber-900 w-[14%]">Can Chi</th>
                                                            <th className="py-[3px] px-0.5 border-r border-[#e5d3b3] font-bold text-amber-900 w-[12%]">P.Thần</th>
                                                            <th className="py-[3px] px-0.5 border-r border-[#e5d3b3] font-bold text-red-700 w-[4%]">TK</th>
                                                            <th className="py-[3px] px-0.5 border-r border-[#e5d3b3] font-bold text-amber-900 w-[12%]">L.Thân(B)</th>
                                                            <th className="py-[3px] px-0.5 border-r border-[#e5d3b3] font-bold text-amber-900 w-[14%]">Can Chi(B)</th>
                                                            <th className="py-[3px] px-0.5 border-r border-[#e5d3b3] font-bold text-amber-900 w-[10%]">Lục Thú</th>
                                                            <th className="py-[3px] px-0.5 border-r border-[#e5d3b3] font-bold text-red-700 w-[4%]">TK</th>
                                                            <th className="py-[3px] px-0.5 font-bold text-amber-900 w-[6%]">Hào</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody>
                                                        {chuLines.slice().reverse().map((line, revIdx) => {
                                                            const idx = 5 - revIdx;
                                                            const isThe = (chuTheHao === idx + 1); 
                                                            const isUng = (chuUngHao === idx + 1); 
                                                            const isMoving = moving[idx];
                                                            const pf = mapPhuc[idx]; 
                                                            const bLine = bienLines[idx];
                                                            
                                                            const elColor = getElementColor(line.element); 
                                                            const bElColor = getElementColor(bLine.element);
                                                            const tkChu = layThandSat(idx, line.chi, line.lucThan).includes("Tuần không");
                                                            const tkBien = isMoving ? layThandSat(idx, bLine.chi, bLine.lucThan).includes("Tuần không") : false;

                                                            return (
                                                                <tr key={idx} className="border-b border-[#e5d3b3]">
                                                                    <td className="py-[3px] px-0.5 border-r border-[#e5d3b3]"><TableHaoSymbol binary={line.binary} isMoving={isMoving} /></td>
                                                                    <td className="py-[3px] px-0.5 border-r border-[#e5d3b3]">{isThe ? <span className="text-red-600 font-bold border border-red-200 rounded-[2px] px-[2px] bg-red-50 text-[7px] sm:text-[9px]">Thế</span> : (isUng ? <span className="text-emerald-600 font-bold border border-emerald-200 rounded-[2px] px-[2px] bg-emerald-50 text-[7px] sm:text-[9px]">Ứng</span> : <span className="text-gray-300">-</span>)}</td>
                                                                    <td className={`py-[3px] px-0.5 border-r border-[#e5d3b3] font-bold ${isMoving ? 'text-red-600' : 'text-gray-800'}`}>{line.lucThan}</td>
                                                                    <td className={`py-[3px] px-0.5 border-r border-[#e5d3b3] font-bold ${isMoving ? 'text-red-600' : elColor}`}>{line.chi}-{line.element}</td>
                                                                    <td className="py-[3px] px-0.5 border-r border-[#e5d3b3] text-gray-600">{pf ? <span className="font-semibold text-amber-800">{pf.lucThan.split(' ')[0]}-{pf.chi}</span> : "-"}</td>
                                                                    <td className="py-[3px] px-0.5 border-r border-[#e5d3b3] text-red-600 font-bold">{tkChu ? 'K' : '-'}</td>
                                                                    <td className={`py-[3px] px-0.5 border-r border-[#e5d3b3] font-bold text-gray-800`}>{isMoving ? bLine.lucThan : "-"}</td>
                                                                    <td className={`py-[3px] px-0.5 border-r border-[#e5d3b3] font-bold ${bElColor}`}>{isMoving ? `${bLine.chi}-${bLine.element}` : "-"}</td>
                                                                    <td className="py-[3px] px-0.5 border-r border-[#e5d3b3] font-bold text-purple-800">{lucThuLineList[idx]}</td>
                                                                    <td className="py-[3px] px-0.5 border-r border-[#e5d3b3] text-red-600 font-bold">{tkBien ? 'K' : '-'}</td>
                                                                    <td className="py-[3px] px-0.5"><TableHaoSymbol binary={bLine.binary} isMoving={false} /></td>
                                                                </tr>
                                                            );
                                                        })}
                                                    </tbody>
                                                </table>
                                            </div>

                                            <div className="mb-0 w-full">
                                                <table className="w-full text-[8px] sm:text-[10px] text-center border-collapse bg-white border border-[#e5d3b3]">
                                                    <thead>
                                                        <tr className="bg-[#f4ebd0] border-b border-[#d4af37]">
                                                            <th className="py-[3px] px-0.5 border-r border-[#e5d3b3] font-bold text-amber-900 w-[14%]">Hào (Chủ)</th>
                                                            <th className="py-[3px] px-0.5 border-r border-[#e5d3b3] font-bold text-amber-900 w-[14%]">V-S (Tháng)</th>
                                                            <th className="py-[3px] px-0.5 border-r border-[#e5d3b3] font-bold text-amber-900 w-[14%]">Nhật Thần</th>
                                                            <th className="py-[3px] px-0.5 border-r border-[#e5d3b3] font-bold text-amber-900 w-[16%]">T.Sinh (Ngày)</th>
                                                            <th className="py-[3px] px-0.5 border-r border-[#e5d3b3] font-bold text-amber-900 w-[14%]">Hào (Biến)</th>
                                                            <th className="py-[3px] px-0.5 border-r border-[#e5d3b3] font-bold text-amber-900 w-[13%]">V-S Biến</th>
                                                            <th className="py-[3px] px-0.5 font-bold text-amber-900 w-[15%]">T.Sinh Biến</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody>
                                                        {chuLines.slice().reverse().map((line, revIdx) => {
                                                            const idx = 5 - revIdx;
                                                            const isMoving = moving[idx];
                                                            const bLine = bienLines[idx];
                                                            
                                                            const v_s = checkVuongSuy(line.element, monthChi);
                                                            const ts_ngay = TR_SINH_MAP[line.element][dayChi];
                                                            let tinhTrang = v_s;
                                                            if (DIA_CHI_XUNG[monthChi] === line.chi) tinhTrang = "N.Phá";
                                                            else if (DIA_CHI_XUNG[dayChi] === line.chi) {
                                                                tinhTrang = ["Vượng", "Tướng"].includes(v_s) ? "Ám Động" : "Nhật Phá";
                                                            }

                                                            const b_vs = isMoving ? checkVuongSuy(bLine.element, monthChi) : "-";
                                                            const b_ts = isMoving ? TR_SINH_MAP[bLine.element][dayChi] : "-";

                                                            return (
                                                                <tr key={idx} className="border-b border-[#e5d3b3]">
                                                                    <td className="py-[3px] px-0.5 border-r border-[#e5d3b3] font-bold text-gray-800">{line.can} {line.chi}</td>
                                                                    <td className="py-[3px] px-0.5 border-r border-[#e5d3b3]">{tinhTrang === "N.Phá" ? <span className="text-red-600 font-bold">N.Phá</span> : <span className={getVuongSuyColor(v_s)}>{v_s}</span>}</td>
                                                                    <td className="py-[3px] px-0.5 border-r border-[#e5d3b3]">{tinhTrang === "Nhật Phá" ? <span className="text-red-600 font-bold">Nhật Phá</span> : (tinhTrang === "Ám Động" ? <span className="text-purple-600 font-bold">Ám Động</span> : <span className="text-gray-300">-</span>)}</td>
                                                                    <td className="py-[3px] px-0.5 border-r border-[#e5d3b3] text-gray-700">{ts_ngay}</td>
                                                                    <td className="py-[3px] px-0.5 border-r border-[#e5d3b3] font-bold text-gray-800">{isMoving ? `${bLine.can} ${bLine.chi}` : "-"}</td>
                                                                    <td className="py-[3px] px-0.5 border-r border-[#e5d3b3]">{isMoving ? <span className={getVuongSuyColor(b_vs)}>{b_vs}</span> : "-"}</td>
                                                                    <td className="py-[3px] px-0.5 text-gray-700">{b_ts}</td>
                                                                </tr>
                                                            );
                                                        })}
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>
                                    )}

                                    {systemType === 'maihoa' && (
                                        <div className="w-full border-t border-amber-300 pt-2 mb-1">
                                            <div className="flex flex-row justify-between items-start px-2 mb-2">
                                                
                                                <div className="flex flex-col items-center w-[30%]">
                                                    <span className="text-[10px] text-amber-800 font-bold uppercase mb-1">Khởi Đầu</span>
                                                    <h2 className="text-[13px] sm:text-[14px] font-extrabold text-[#a91d1d] uppercase serif-title tracking-wide text-center">{mhChuNameFull}</h2>
                                                    <BigHexagram lines={mhChuLines} className="w-10 sm:w-12 space-y-1 sm:space-y-1.5 my-1.5" lineClass="h-1 sm:h-1.5" />
                                                    <div className="text-[8px] sm:text-[9px] space-y-0.5 text-center mt-1">
                                                        <p>Thượng: <span className={`font-bold ${getElementColor(mhUpperQuai.element)}`}>{mhUpperQuai.name}</span> {isDongInUpper ? <span className="text-red-600 font-bold">(Dụng)</span> : <span className="text-emerald-700 font-bold">(Thể)</span>}</p>
                                                        <p>Hạ: <span className={`font-bold ${getElementColor(mhLowerQuai.element)}`}>{mhLowerQuai.name}</span> {isDongInUpper ? <span className="text-emerald-700 font-bold">(Thể)</span> : <span className="text-red-600 font-bold">(Dụng)</span>}</p>
                                                    </div>
                                                </div>

                                                <div className="flex flex-col items-center w-[30%] border-x border-dashed border-amber-300 px-1">
                                                    <span className="text-[10px] text-gray-500 font-bold uppercase mb-1">Quá Trình</span>
                                                    <h2 className="text-[13px] sm:text-[14px] font-extrabold text-amber-900 uppercase serif-title tracking-wide text-center">{mhHoNameFull}</h2>
                                                    <BigHexagram lines={mhHoLines} className="w-10 sm:w-12 space-y-1 sm:space-y-1.5 my-1.5" lineClass="h-1 sm:h-1.5" />
                                                    <div className="text-[8px] sm:text-[9px] space-y-0.5 text-center mt-1 text-gray-600">
                                                        <p>Thượng: <span className={`font-bold ${getElementColor(hoUpperQuai.element)}`}>{hoUpperQuai.name}</span></p>
                                                        <p>Hạ: <span className={`font-bold ${getElementColor(hoLowerQuai.element)}`}>{hoLowerQuai.name}</span></p>
                                                    </div>
                                                </div>

                                                <div className="flex flex-col items-center w-[30%]">
                                                    <span className="text-[10px] text-[#a91d1d] font-bold uppercase mb-1">Kết Quả</span>
                                                    <h2 className="text-[13px] sm:text-[14px] font-extrabold text-[#a91d1d] uppercase serif-title tracking-wide text-center">{mhBienNameFull}</h2>
                                                    <BigHexagram lines={mhBienLines} className="w-10 sm:w-12 space-y-1 sm:space-y-1.5 my-1.5" lineClass="h-1 sm:h-1.5" />
                                                    <div className="text-[8px] sm:text-[9px] space-y-0.5 text-center mt-1">
                                                        <p>Thượng: <span className={`font-bold ${getElementColor(mhUpperBienQuai.element)}`}>{mhUpperBienQuai.name}</span></p>
                                                        <p>Hạ: <span className={`font-bold ${getElementColor(mhLowerBienQuai.element)}`}>{mhLowerBienQuai.name}</span></p>
                                                    </div>
                                                </div>

                                            </div>
                                        </div>
                                    )}

                                    <div className="w-full mt-2 no-print">
                                        <div className="flex items-center gap-2 mb-2 border-t border-amber-300 pt-3">
                                            <i className="fa-solid fa-book-journal-whills text-[#a91d1d] text-xl"></i>
                                            <h3 className="text-[14px] sm:text-[16px] font-bold text-[#8b1c1c] uppercase serif-title">Lời Bàn Luận Giải Của Dịch Sư</h3>
                                        </div>
                                        <textarea 
                                            id="luan-giai-textarea" 
                                            ref={textRef} 
                                            className="auto-resize w-full p-3 border border-amber-300 rounded outline-none bg-white text-gray-900 document-text text-[12px] sm:text-[13px] leading-relaxed" 
                                            style={{ minHeight: '150px' }} 
                                            placeholder={placeholderText} 
                                            value={luanGiaiText} 
                                            onChange={(e) => setLuanGiaiText(e.target.value)}
                                        ></textarea>
                                    </div>

                                    <div className="mt-1 pt-1.5 border-t border-[#d4af37] flex flex-row justify-between items-end px-2 gap-2">
                                        <div className="text-[7px] sm:text-[8px] font-medium space-y-0.5 document-text text-left">
                                            <p className="text-[#a91d1d] font-bold mb-1">Hệ thống an sao Dịch Lý</p>
                                            <p className="flex items-center gap-1.5 text-gray-800"><i className="fa-brands fa-facebook text-[#1877F2]"></i> <span>FB: Lê Hữu Hải</span></p>
                                            <p className="flex items-center gap-1.5 text-gray-800"><i className="fa-solid fa-square-phone text-[#25D366]"></i> <span>Zalo: 0982076615</span></p>
                                        </div>
                                        <div className="text-right">
                                            <p className="text-[6px] sm:text-[7px] text-amber-900 mb-[-2px] font-bold uppercase tracking-widest document-text">Luận giải bởi</p>
                                            <h3 className="text-[18px] sm:text-[22px] rainbow-text signature-font font-bold">Thiên Cơ Tửu Khách</h3>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MainApp />);
    </script>
</body>
</html>
