            const [systemType, setSystemType] = React.useState('luchao'); 
            
            const [upperId, setUpperId] = React.useState(7); 
            const [lowerId, setLowerId] = React.useState(0); 
            const [moving, setMoving] = React.useState([false, false, false, false, false, false]); 
            
            const [numUpper, setNumUpper] = React.useState('8');
            const [numLower, setNumLower] = React.useState('1');
            const [numMoving, setNumMoving] = React.useState('1');
            const [serialString, setSerialString] = React.useState(''); 
            
            const [activeCategory, setActiveCategory] = React.useState('tatca');
            const [mucDich, setMucDich] = React.useState('Tổng quan vận hạn'); 

            const [solarDate, setSolarDate] = React.useState(''); 
            const [solarTime, setSolarTime] = React.useState(''); 
            
            const [lunarDay, setLunarDay] = React.useState('');
            const [lunarMonth, setLunarMonth] = React.useState('');
            const [lunarYear, setLunarYear] = React.useState('');
            const [isLeapMonth, setIsLeapMonth] = React.useState(false);
            
            const [tietKhi, setTietKhi] = React.useState('Chưa rõ/Không dùng');
            
            const [yearCan, setYearCan] = React.useState('Giáp');
            const [yearChi, setYearChi] = React.useState('Thìn');
            const [monthCan, setMonthCan] = React.useState('Bính');
            const [monthChi, setMonthChi] = React.useState('Dần');
            const [dayCan, setDayCan] = React.useState('Giáp');
            const [dayChi, setDayChi] = React.useState('Tý');
            const [hourCan, setHourCan] = React.useState('Giáp');
            const [hourChi, setHourChi] = React.useState('Tý');

            const [luanGiaiText, setLuanGiaiText] = React.useState('');
            const [isGenerating, setIsGenerating] = React.useState(false);
            const [isExporting, setIsExporting] = React.useState(false);
            const textRef = React.useRef(null);
            
            const [notification, setNotification] = React.useState('');

            const showNotification = (msg) => {
                setNotification(msg);
                setTimeout(() => setNotification(''), 3000);
            };

            React.useEffect(() => { 
                thietLapGioHienTai(); 
            }, []);

            React.useEffect(() => {
                if (textRef.current) {
                    textRef.current.style.height = 'auto';
                    textRef.current.style.height = textRef.current.scrollHeight + 'px';
                }
            }, [luanGiaiText, view]);

            const handleSerialChange = (val) => {
                setSerialString(val);
                const digits = val.replace(/\D/g, ''); 
                if (digits.length > 0) {
                    const mid = Math.floor(digits.length / 2);
                    const s1 = digits.slice(0, mid);
                    const s2 = digits.slice(mid);
                    
                    let sum1 = s1.split('').reduce((acc, curr) => acc + parseInt(curr), 0);
                    let sum2 = s2.split('').reduce((acc, curr) => acc + parseInt(curr), 0);
                    
                    if (s1.length === 0) sum1 = sum2; 
                    if (sum1 === 0) sum1 = 8; 
                    if (sum2 === 0) sum2 = 8;
                    
                    const totalSum = sum1 + sum2;
                    let upper = sum1 % 8; if (upper === 0) upper = 8;
                    let lower = sum2 % 8; if (lower === 0) lower = 8;
                    let movingLine = totalSum % 6; if (movingLine === 0) movingLine = 6;

                    setNumUpper(upper.toString());
                    setNumLower(lower.toString());
                    setNumMoving(movingLine.toString());
                }
            };

            const layThandSat = (idx, chiName, lucThan) => {
                const stars = [];
                let tkList = [];
                const dayCanChi = dayCan + " " + dayChi;
                if (["Giáp Tý", "Ất Sửu", "Bính Dần", "Đinh Mão", "Mậu Thìn", "Kỷ Tỵ", "Canh Ngọ", "Tân Mùi", "Nhâm Thân", "Quý Dậu"].includes(dayCanChi)) tkList = ["Tuất", "Hợi"];
                else if (["Giáp Tuất", "Ất Hợi", "Bính Tý", "Đinh Sửu", "Mậu Dần", "Kỷ Mão", "Canh Thìn", "Tân Tỵ", "Nhâm Ngọ", "Quý Mùi"].includes(dayCanChi)) tkList = ["Thân", "Dậu"];
                else if (["Giáp Thân", "Ất Dậu", "Bính Tuất", "Đinh Hợi", "Mậu Tý", "Kỷ Sửu", "Canh Dần", "Tân Mão", "Nhâm Thìn", "Quý Tỵ"].includes(dayCanChi)) tkList = ["Ngọ", "Mùi"];
                else if (["Giáp Ngọ", "Ất Mùi", "Bính Thân", "Đinh Dậu", "Mậu Tuất", "Kỷ Hợi", "Canh Tý", "Tân Sửu", "Nhâm Dần", "Quý Mão"].includes(dayCanChi)) tkList = ["Thìn", "Tỵ"];
                else if (["Giáp Thìn", "Ất Tỵ", "Bính Ngọ", "Đinh Mùi", "Mậu Thân", "Kỷ Dậu", "Canh Tuất", "Tân Hợi", "Nhâm Tý", "Quý Sửu"].includes(dayCanChi)) tkList = ["Dần", "Mão"];
                else tkList = ["Tý", "Sửu"]; 

                if (tkList.includes(chiName)) stars.push("Tuần không");
                return stars;
            };

            const toggleHaoDong = (index) => {
                const nextMov = [...moving];
                nextMov[index] = !nextMov[index];
                setMoving(nextMov);
            };

            const thietLapGioHienTai = () => {
                const current = new Date();
                const yyyy = current.getFullYear();
                const mm = String(current.getMonth() + 1).padStart(2, '0');
                const dd = String(current.getDate()).padStart(2, '0');
                setSolarDate(`${yyyy}-${mm}-${dd}`);
                
                const hh = String(current.getHours()).padStart(2, '0');
                const mins = String(current.getMinutes()).padStart(2, '0');
                setSolarTime(`${hh}:${mins}`);

                try {
                    if (typeof Lunar !== 'undefined' && typeof Solar !== 'undefined') {
                        const solar = Solar.fromDate(current);
                        const lunar = solar.getLunar();
                        let lMonth = lunar.getMonth();
                        if (lMonth < 0) {
                            setIsLeapMonth(true);
                            setLunarMonth(String(Math.abs(lMonth)));
                        } else {
                            setIsLeapMonth(false);
                            setLunarMonth(String(lMonth));
                        }
                        setLunarDay(String(lunar.getDay()));
                        setLunarYear(String(lunar.getYear()));
                    } else {
                        setLunarDay(''); setLunarMonth(''); setLunarYear('');
                    }
                } catch (e) {
                    setLunarDay(''); setLunarMonth(''); setLunarYear('');
                }

                const yearCanIdx = ((yyyy - 4) % 10 + 10) % 10;
                const yearChiIdx = ((yyyy - 4) % 12 + 12) % 12;
                setYearCan(THIEN_CAN[yearCanIdx]);
                setYearChi(DIA_CHI[yearChiIdx]);

                const anchor = new Date(2024, 0, 1);
                const diffTime = current - anchor;
                const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
                const dayCanIdx = ((diffDays % 10) + 10) % 10;
                const dayChiIdx = ((diffDays % 12) + 12) % 12;
                setDayCan(THIEN_CAN[dayCanIdx]);
                setDayChi(DIA_CHI[dayChiIdx]);

                let month1Can = 0; 
                if (yearCanIdx === 0 || yearCanIdx === 5) month1Can = 2; 
                else if (yearCanIdx === 1 || yearCanIdx === 6) month1Can = 4; 
                else if (yearCanIdx === 2 || yearCanIdx === 7) month1Can = 6; 
                else if (yearCanIdx === 3 || yearCanIdx === 8) month1Can = 8; 
                let lunarMonthIdx = current.getMonth();
                if(current.getDate() < 8) lunarMonthIdx -= 1; 
                if(lunarMonthIdx < 0) lunarMonthIdx += 12;
                const finalMonthCan = (month1Can + lunarMonthIdx - 1 + 10) % 10;
                const finalMonthChi = (2 + lunarMonthIdx - 1 + 12) % 12; 
                setMonthCan(THIEN_CAN[finalMonthCan]);
                setMonthChi(DIA_CHI[finalMonthChi]);

                let hour1Can = 0;
                if(dayCanIdx === 0 || dayCanIdx === 5) hour1Can = 0;
                else if(dayCanIdx === 1 || dayCanIdx === 6) hour1Can = 2;
                else if(dayCanIdx === 2 || dayCanIdx === 7) hour1Can = 4;
                else if(dayCanIdx === 3 || dayCanIdx === 8) hour1Can = 6;
                else if(dayCanIdx === 4 || dayCanIdx === 9) hour1Can = 8;
                
                const hourChiIdx = Math.floor((current.getHours() + 1) % 24 / 2);
                const finalHourCan = (hour1Can + hourChiIdx) % 10;
                
                setHourCan(THIEN_CAN[finalHourCan]);
                setHourChi(DIA_CHI[hourChiIdx]);
                setTietKhi('Tiểu Thử'); 
            };

            const keyChu = `${upperId}_${lowerId}`;
            const [chuName, chuCungName, chuTheHao, chuThoan] = HEXAGRAM_DATABASE[keyChu] || ["Quẻ Lạ", "Càn", 6, "HUNG CÁT KHÓ LƯỜNG"];
            const chuCungElement = CUNG_ELEMENTS[chuCungName];
            const chuUngHao = (chuTheHao + 2) % 6 + 1;

            const chuLines = [];
            const upperBin = BAT_QUAI[upperId].binary;
            const lowerBin = BAT_QUAI[lowerId].binary;
            const totalBinChu = [...lowerBin, ...upperBin]; 

            for (let idx = 0; idx < 6; idx++) {
                const isUpper = idx >= 3;
                const trigramId = isUpper ? upperId : lowerId;
                const info = anLinhHao(trigramId, idx);
                chuLines.push({
                    index: idx,
                    binary: totalBinChu[idx],
                    can: info.can,
                    chi: info.chi,
                    element: info.element,
                    lucThan: getLucThan(chuCungElement, info.element),
                    isDong: moving[idx]
                });
            }

            const mapPhuc = timPhucThan(chuCungName, chuLines);
            const totalBinBien = totalBinChu.map((val, idx) => moving[idx] ? (val === 1 ? 0 : 1) : val);
            
            const findTrigramFromBinary = (binArr) => {
                const t = BAT_QUAI.find(b => b.binary[0] === binArr[0] && b.binary[1] === binArr[1] && b.binary[2] === binArr[2]);
                return t ? t.id : 0;
            };
            const bienLowerId = findTrigramFromBinary(totalBinBien.slice(0, 3));
            const bienUpperId = findTrigramFromBinary(totalBinBien.slice(3, 6));

            const keyBien = `${bienUpperId}_${bienLowerId}`;
            const [bienName, bienCungName] = HEXAGRAM_DATABASE[keyBien] || ["Biến Quẻ", "Khôn", 6, "VẠN SỰ BIẾN ĐỔI"];

            const bienLines = [];
            for (let idx = 0; idx < 6; idx++) {
                const isUpper = idx >= 3;
                const trigramId = isUpper ? bienUpperId : bienLowerId;
                const info = anLinhHao(trigramId, idx);
                bienLines.push({
                    index: idx,
                    binary: totalBinBien[idx],
                    can: info.can,
                    chi: info.chi,
                    element: info.element,
                    lucThan: getLucThan(chuCungElement, info.element)
                });
            }

            const startLucThuIdx = LUC_THU_KHOI[dayCan] || 0;
            const lucThuLineList = [];
            for (let i = 0; i < 6; i++) {
                lucThuLineList.push(LUC_THU_LIST[(startLucThuIdx + i) % 6]);
            }

            const layQuaiMaiHoa = (num) => {
                const n = parseInt(num) || 1;
                const r = n % 8;
                const s = r === 0 ? 8 : r;
                return BAT_QUAI.find(q => q.number === s) || BAT_QUAI[0];
            };

            const layHaoDongMaiHoa = (num) => {
                const n = parseInt(num) || 1;
                const r = n % 6;
                return r === 0 ? 6 : r;
            };

            const mhUpperQuai = layQuaiMaiHoa(numUpper);
            const mhLowerQuai = layQuaiMaiHoa(numLower);
            const mhHaoDong = layHaoDongMaiHoa(numMoving); 

            const totalMhBinChu = [...mhLowerQuai.binary, ...mhUpperQuai.binary];
            const totalMhBinBien = totalMhBinChu.map((v, i) => (i === (mhHaoDong - 1)) ? (v === 1 ? 0 : 1) : v);

            const mhLowerBienId = findTrigramFromBinary(totalMhBinBien.slice(0, 3));
            const mhUpperBienId = findTrigramFromBinary(totalMhBinBien.slice(3, 6));
            const mhUpperBienQuai = BAT_QUAI[mhUpperBienId];
            const mhLowerBienQuai = BAT_QUAI[mhLowerBienId];

            const mhChuKey = `${mhUpperQuai.id}_${mhLowerQuai.id}`;
            const mhChuNameFull = HEXAGRAM_DATABASE[mhChuKey] ? HEXAGRAM_DATABASE[mhChuKey][0] : `${mhUpperQuai.name} ${mhLowerQuai.name}`;

            const mhBienKey = `${mhUpperBienId}_${mhLowerBienId}`;
            const mhBienNameFull = HEXAGRAM_DATABASE[mhBienKey] ? HEXAGRAM_DATABASE[mhBienKey][0] : `${mhUpperBienQuai.name} ${mhLowerBienQuai.name}`;

            const isDongInUpper = (mhHaoDong > 3);
            const theQuai = isDongInUpper ? mhLowerQuai : mhUpperQuai;
            const dungQuai = isDongInUpper ? mhUpperQuai : mhLowerQuai;

            const hoUpperBin = [totalMhBinChu[2], totalMhBinChu[3], totalMhBinChu[4]];
            const hoLowerBin = [totalMhBinChu[1], totalMhBinChu[2], totalMhBinChu[3]];
            const hoUpperQuai = BAT_QUAI[findTrigramFromBinary(hoUpperBin)];
            const hoLowerQuai = BAT_QUAI[findTrigramFromBinary(hoLowerBin)];

            const mhHoKey = `${hoUpperQuai.id}_${hoLowerQuai.id}`;
            const mhHoNameFull = HEXAGRAM_DATABASE[mhHoKey] ? HEXAGRAM_DATABASE[mhHoKey][0] : `${hoUpperQuai.name} ${hoLowerQuai.name}`;

            const layLuanGiaiMaiHoa = () => {
                const theEl = theQuai.element;
                const dungEl = dungQuai.element;
                if (theEl === dungEl) return { status: "Tỷ hòa (Bình hòa - Đắc lợi)", desc: `Tượng quẻ Âm Dương điều hòa. Thể quẻ (${theQuai.name} - ${theEl}) cùng bản hành với Dụng quẻ (${dungQuai.name} - ${dungEl}). Mưu sự đắc nhân hòa, có bằng hữu kề vai sát cánh, sự tất thành mà không nhọc sức.` };
                if (ELEMENTS_RELATION[theEl].sinh === dungEl) return { status: "Thể sinh Dụng (Tiêu hao - Bán kiết)", desc: `Bản Thể hành ${theEl} phải trút khí lực sinh cho Dụng hành ${dungEl.toLowerCase()}. Báo hiệu một phen hao tâm tổn trí, dốc túi chi tiền để lo toan gánh vác. Có được cũng phải trầy da tróc vẩy.` };
                if (ELEMENTS_RELATION[dungEl].sinh === theEl) return { status: "Dụng sinh Thể (Đại Cát)", desc: `Khí của Dụng hành ${dungEl} tuôn chảy bồi đắp cho Thể hành ${theEl}. Điềm báo trời ban phước lành, quý nhân âm thầm tương trợ, mưu cầu danh lợi đắc ý, ngồi mát ăn bát vàng.` };
                if (ELEMENTS_RELATION[theEl].khac === dungEl) return { status: "Thể khắc Dụng (Cát lợi có điều kiện)", desc: `Thể hành ${theEl} khống chế vây hãm được Dụng hành ${dungEl}. Tượng khắc phục gian nan, đoạt lấy thành quả. Phải bôn ba vất vả đoạn đầu, đoạn sau gặt hái vẻ vang.` };
                if (ELEMENTS_RELATION[dungEl].khac === theEl) return { status: "Dụng khắc Thể (Hung hại)", desc: `Nghịch cảnh giăng lối. Dụng hành ${dungEl} hung hãn khắc phạt Thể hành ${theEl}. Mưu sự bế tắc, đề phòng tiểu nhân, tai ương hoặc bệnh tật bất ngờ ập tới. Nên thủ cựu chờ thời.` };
                return { status: "Bình hòa", desc: "Sự việc diễn biến ở thế cân bằng, tùy vào hành động của đương số." };
            };
            const mhLuanGiai = layLuanGiaiMaiHoa();

            const handleSetupSubmit = () => {
                setLuanGiaiText('');
                setView('result');
            };

            const getScoreString = (score) => {
                if (score >= 3) return "ĐẠI CÁT (Nên tiến hành lập tức, trăm sự hanh thông)";
                if (score > 0) return "CÁT (Có thành quả, đôi chút trắc trở nhưng cuối cùng viên mãn)";
                if (score === 0) return "BÌNH HÒA (Mọi sự tùy duyên, tiến thủ hay thủ cựu đều cân bằng)";
                if (score > -3) return "HUNG (Trắc trở nhiều, tiểu nhân ngáng trở, cần đề phòng)";
                return "ĐẠI HUNG (Bế tắc, đại họa rình rập, nên dừng lại hoặc lui binh gấp)";
            };

            // =========================================================================
            // LẬP TRÌNH LUẬN GIẢI CHUẨN MỰC TĂNG SAN BỐC DỊCH (DÃ HẠC LÃO NHÂN)
            // =========================================================================
            const generateSystemInterpretation = () => {
                setIsGenerating(true);
                setTimeout(() => {
                    let txt = `[BÍ TRUYỀN TĂNG SAN BỐC DỊCH] - KINH ĐIỂN DÃ HẠC LÃO NHÂN\n\n`;
                    txt += `Kính thưa quý hữu, quẻ chiêm về việc "${mucDich}" được lập vào tiết ${monthCan} ${monthChi}, ngày ${dayCan} ${dayChi} (Nhật thần: ${dayChi}, Nguyệt lệnh: ${monthChi}). `;
                    txt += `Y theo phép định Dụng thần, xét vượng suy, xem sinh khắc chế hóa, hình xung phá hại và tuần không của Tăng San Bốc Dịch, lão phu xin tường giải như sau:\n\n`;

                    let overallScore = 0; 

                    if (systemType === 'luchao') {
                        let dungThanTarget = "Hào Thế"; 
                        let dungThanName = "Bổn mạng / Bản thân đương số";
                        const mLower = mucDich.toLowerCase();
                        
                        // 1. PHÂN ĐỊNH DỤNG THẦN CHUẨN XÁC
                        if (mLower.includes("công danh") || mLower.includes("thăng tiến") || mLower.includes("kiện tụng") || mLower.includes("tranh chấp") || mLower.includes("quan")) {
                            dungThanTarget = "Quan Quỷ"; dungThanName = "Công danh / Quan phủ / Quan lại / Kẻ bề trên";
                        } else if (mLower.includes("tài lộc") || mLower.includes("kinh doanh") || mLower.includes("tài") || mLower.includes("buôn bán")) {
                            dungThanTarget = "Thê Tài"; dungThanName = "Tiền tài / Lợi nhuận / Hàng hóa / Nữ nhân";
                        } else if (mLower.includes("gia đạo") || mLower.includes("nhà cửa") || mLower.includes("phụ mẫu") || mLower.includes("văn thư") || mLower.includes("bằng cấp")) {
                            dungThanTarget = "Phụ Mẫu"; dungThanName = "Trưởng bối / Nhà cửa / Văn thư / Bằng cấp";
                        } else if (mLower.includes("sức khỏe") || mLower.includes("bệnh tật") || mLower.includes("con cái") || mLower.includes("cầu tự")) {
                            dungThanTarget = "Tử Tôn"; dungThanName = "Phúc thần / Y dược / Con cái / Giải ách";
                        }

                        txt += `► BƯỚC 1: XÁC ĐỊNH DỤNG THẦN & HÀO THẾ\n`;
                        txt += `- Hỏi về việc này, theo pháp lý bốc phệ, ta lấy hào **${dungThanTarget}** làm Dụng Thần (${dungThanName}).\n`;
                        txt += `- Hào Thế đóng tại hào **${chuTheHao}** đại diện cho chính bản thân đương số.\n\n`;

                        // 2. XÉT VƯỢNG SUY CỦA HÀO THẾ VÀ DỤNG THẦN
                        const theLine = chuLines.find(l => l.index === chuTheHao - 1);
                        const vsThe = checkVuongSuy(theLine.element, monthChi);
                        const tkThe = layThandSat(theLine.index, theLine.chi, theLine.lucThan).includes("Tuần không");
                        
                        txt += `► BƯỚC 2: XÉT TRẠNG THÁI HÀO THẾ (BẢN MẠNG)\n`;
                        txt += `* Hào Thế lâm ${theLine.lucThan} (${theLine.can} ${theLine.chi} - hành ${theLine.element}). So với Nguyệt lệnh tháng ${monthChi}, hào này ở trạng thái **[${vsThe}]**.\n`;
                        
                        if (["Vượng", "Tướng"].includes(vsThe)) {
                            txt += `  => *Lời bàn:* Thế đắc lệnh vượng tướng, bản thân đương số có thực lực, tâm trí vững vàng, tự thân có khả năng gánh vác và xoay chuyển cục diện.\n`;
                            overallScore += 1;
                        } else {
                            txt += `  => *Lời bàn:* Thế hưu tù suy nhược, tựa như hổ đói sa lầy, lực bất tòng tâm, e rằng bản thân đang thiếu tự tin hoặc gặp hoàn cảnh khó khăn trói buộc.\n`;
                            overallScore -= 1;
                        }

                        if (tkThe) {
                            txt += `  => *Đặc biệt chú ý:* Hào Thế lâm **Tuần Không** (Không vong)! Sách cổ dạy: "Thế không vạn sự hư". Tâm ý bất định, suy tính mông lung, mưu sự tựa hoa trong gương trăng đáy nước, thấy đó mà không cầm nắm được.\n`;
                            overallScore -= 2;
                        }
                        txt += `\n`;

                        // 3. XÉT DỤNG THẦN, NGUYÊN THẦN, KY THẦN, CỪU THẦN
                        const dungThanLines = chuLines.filter(l => l.lucThan.includes(dungThanTarget.split('/')[0].trim()));
                        
                        txt += `► BƯỚC 3: XÉT DỤNG THẦN & QUAN HỆ NGUYÊN - KỴ - CỪU\n`;
                        if (dungThanTarget === "Hào Thế") {
                            txt += `* Dụng Thần đồng thời là Hào Thế. Cát hung của sự việc hoàn toàn tùy thuộc vào sự vượng suy và tương tác của Hào Thế với Nhật/Nguyệt và Hào Động.\n\n`;
                        } else if (dungThanLines.length === 0) {
                            txt += `* ⚠️ CẢNH BÁO: Tìm khắp quẻ chính không thấy bóng dáng Dụng Thần **${dungThanTarget}**! Đây là quẻ **Dụng Thần Phục Tàng** (ẩn dưới hào khác cùng cột cung). Điềm báo sự việc hiện tại mịt mờ, chưa rõ đầu đuôi, người hoặc của cải chưa xuất hiện, phải đợi ngày tháng xung phá Phục thần hoặc xuất hiện mới có hy vọng.\n\n`;
                            overallScore -= 2;
                        } else {
                            dungThanLines.forEach(dtLine => {
                                const vsDt = checkVuongSuy(dtLine.element, monthChi);
                                const tkDt = layThandSat(dtLine.index, dtLine.chi, dtLine.lucThan).includes("Tuần không");
                                txt += `* Dụng thần xuất hiện tại Hào ${dtLine.index + 1} (${dtLine.lucThan} - ${dtLine.element}). Trạng thái so với Nguyệt lệnh: **[${vsDt}]**.\n`;
                                
                                if (["Vượng", "Tướng"].includes(vsDt)) {
                                    txt += `  => Dụng thần đắc địa, căn cơ vững chắc, bản chất sự việc rất tốt đẹp.\n`;
                                    overallScore += 1;
                                } else {
                                    txt += `  => Dụng thần hưu tù, sự việc kém phần khí thế, dễ sinh trắc trở.\n`;
                                    overallScore -= 1;
                                }

                                if (tkDt) {
                                    txt += `  => *Điểm hung:* Dụng thần lâm Tuần Không! Dù có vượng cũng hóa hư không, mọi hứa hẹn chỉ là bánh vẽ, phải đợi ngày xuất Không (vãn Không).\n`;
                                    overallScore -= 2;
                                }

                                // Tương tác Sinh Khắc với Hào Thế
                                const rel = ELEMENTS_RELATION[dtLine.element];
                                if (rel.sinh === theLine.element) {
                                    txt += `  => *Đại Cát:* Dụng thần sinh nhập cho Hào Thế. Tiền tài/công danh/phúc lộc tự động tìm đến ta, cầu gì được nấy mà không hao tổn tâm sức.\n`;
                                    overallScore += 2;
                                } else if (ELEMENTS_RELATION[theLine.element].sinh === dtLine.element) {
                                    txt += `  => *Tiêu hao:* Hào Thế sinh xuất cho Dụng thần. Ta phải dốc túi chi tiền, hao tâm tổn sức, lo toan ngược xuôi thì mới mong thành sự.\n`;
                                    overallScore -= 1;
                                } else if (rel.khac === theLine.element) {
                                    txt += `  => *Hung hại:* Dụng thần khắc Hào Thế. Sự việc mang lại áp lực, tiểu nhân hãm hại hoặc tai ương bức bách ta.\n`;
                                    overallScore -= 2;
                                } else if (ELEMENTS_RELATION[theLine.element].khac === dtLine.element) {
                                    txt += `  => *Đắc lợi:* Hào Thế khắc chế Dụng thần. Ta nắm thế chủ động, dùng mưu trí hoặc sức mạnh để đoạt lấy thành quả.\n`;
                                    overallScore += 1;
                                } else {
                                    txt += `  => *Bình hòa:* Dụng thần và Hào Thế tỷ hòa (cùng hành), thế cuộc cân bằng, có người đồng tâm hiệp lực.\n`;
                                    overallScore += 1;
                                }
                                txt += `\n`;
                            });
                        }

                        // 4. XÉT HÀO ĐỘNG & BIẾN HÓA (HỒI ĐẦU SINH / KHẮC)
                        const dongLines = chuLines.filter(l => l.isDong);
                        txt += `► BƯỚC 4: XÉT HÀO ĐỘNG & BIẾN HÓA (CƠ MẦU CÀN KHÔN)\n`;
                        if (dongLines.length > 0) {
                            dongLines.forEach(dLine => {
                                const bLine = bienLines.find(bl => bl.index === dLine.index);
                                txt += `- Hào ${dLine.index + 1} (${dLine.lucThan} - ${dLine.element}) động hóa sang Hào ${bLine.index + 1} Biến (${bLine.lucThan} - ${bLine.element}).\n`;
                                
                                const elD = dLine.element;
                                const elB = bLine.element;
                                
                                if (ELEMENTS_RELATION[elB].sinh === elD) {
                                    txt += `  => **Động Hóa Hồi Đầu Sinh (Đại Cát):** Biến sinh cho hào động. Điềm báo việc đang khốn cùng bỗng có quý nhân cứu giúp, phúc lộc nhân đôi, chuyển nguy thành an.\n`;
                                    overallScore += 2;
                                } else if (ELEMENTS_RELATION[elB].khac === elD) {
                                    txt += `  => **Động Hóa Hồi Đầu Khắc (Đại Hung):** Biến khắc ngược hào động. Sách Tăng San cực kỳ kỵ điều này! Đang đi suôn sẻ bỗng giữa đường đứt gánh, việc tưởng thành lại đổ vỡ phút chót, tự mình chuốc họa vào thân.\n`;
                                    overallScore -= 3;
                                } else if (elD === elB) {
                                    txt += `  => **Tiến thần / Thối thần:** Động hóa tỷ hòa, ý chí kiên định hoặc sự việc tiếp diễn theo chiều hướng cũ.\n`;
                                } else {
                                    txt += `  => Sự biến hóa sinh khắc tuần hoàn, cần xét thêm Nhật/Nguyệt để định đoạt.\n`;
                                }
                            });
                            txt += `\n`;
                        } else {
                            txt += `* Quẻ tĩnh không có hào động. Sách dạy: "Quẻ tĩnh xem chủ quẻ và nguyên thần, kỵ thần". Sự việc đang diễn biến bình lặng, âm thầm theo quỹ đạo cũ chứ chưa có biến động lớn.\n\n`;
                        }

                        txt += `► BƯỚC 1: XÉT THỂ DỤNG MAI HOA\n`;
                        txt += `- Bản Thể quẻ: ${theQuai.name} (Hành ${theQuai.element}) - Đại diện cho bản mệnh ta.\n`;
                        txt += `- Dụng quẻ (Hoàn cảnh): ${dungQuai.name} (Hành ${dungQuai.element}) - Đại diện cho sự việc bên ngoài.\n`;
                        txt += `=> *Tương quan:* ${mhLuanGiai.status}.\n${mhLuanGiai.desc}\n\n`;

                        txt += `► BƯỚC 2: XÉT TIẾN TRÌNH QUẺ CHỦ - HỖ - BIẾN\n`;
                        txt += `1. Quẻ Chủ (${mhChuNameFull}): Phản ánh hiện trạng lúc ban đầu, nguyên nhân gốc rễ của vấn đề.\n`;
                        txt += `2. Quẻ Hỗ (${mhHoNameFull}): Phản ánh quá trình diễn biến nội tâm và tác động ngầm ở giai đoạn giữa.\n`;

                        if (mhLuanGiai.status.includes("Đại Cát") || mhLuanGiai.status.includes("Bình hòa")) overallScore = 2;
                        else if (mhLuanGiai.status.includes("Tiêu hao")) overallScore = 0;
                        else overallScore = -2;

                    txt += `► KẾT LUẬN TỔNG QUAN TĂNG SAN:\n`;
                    txt += `Chiếu theo toàn bộ lý khí vượng suy, sinh khắc, hồi đầu sinh khắc và tuần không nêu trên, lão phu định đoạt quẻ này là: **${getScoreString(overallScore)}**.\n\n`;
                    txt += `* Lời khuyên của Dã Hạc Lão Nhân: "Trời có thấu chăng đạo bốc phệ? Quẻ linh là để biết đường xu cát tị hung". Việc đời cát hung tuy có định số, nhưng phước đức tại tâm, nỗ lực ở người. Thuận theo lý trời mà hành sự thì ắt gặp dữ hóa lành!\n`;

                    setIsGenerating(false);

                        if(textArea) {
                            textArea.scrollIntoView({ behavior: 'smooth' });
                            textArea.style.height = 'auto';
                            textArea.style.height = textArea.scrollHeight + 'px';
                        }

                const opt = {

                    jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }

                    setIsExporting(false);
                    showNotification("Đã tải PDF thành công!");

                        <div className="flex gap-2 w-full sm:w-auto justify-center">

                                <i className="fa-solid fa-plus"></i> Soạn Quẻ Mới
                            </button>

                    {view === 'setup' && (
